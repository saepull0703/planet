<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planet Terserah</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
/* SAFETY FIX LANGSUNG DI HTML (BIAR PASTI JALAN) */

body{
  margin:0;
  overflow:hidden;
}

#three{
  position:fixed;
  inset:0;
  z-index:1;
}

.ui{
  position:fixed;
  inset:0;
  z-index:9999;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.2);
}

button{
  pointer-events:auto;
  padding:12px 20px;
  border:none;
  border-radius:20px;
  background:rgba(255,255,255,0.15);
  color:white;
}
</style>

</head>

<body>

<!-- AUDIO -->
<audio id="bgm" src="01.mp3" loop></audio>

<!-- THREE CANVAS -->
<div id="three"></div>

<!-- UI START -->
<div class="ui" id="ui">
  <h1>PLANET TERSERAH</h1>
  <p>tap untuk masuk</p>
  <button id="enter">🚀 ENTER</button>
</div>

<!-- MODAL -->
<div id="modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:99999;justify-content:center;align-items:center;">
  <div style="background:rgba(255,255,255,0.1);padding:20px;border-radius:20px;">
    <span id="close" style="cursor:pointer;font-size:20px;">✕</span>
    <img id="modalImg" style="width:250px;border-radius:10px;display:block;margin-top:10px;">
  </div>
</div>

<!-- THREE JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>

<!-- SCRIPT -->
<script src="script.js"></script>

</body>
</html>
